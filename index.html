<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>Diptych</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" />
  </noscript>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: #0a0a0a;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overscroll-behavior: none;
      overflow: hidden;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #0a0a0a;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .header {
      padding: 40px 28px 12px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .header-titles { display: flex; flex-direction: column; gap: 3px; }
    .title {
      font-family: 'DM Serif Display', Georgia, 'Times New Roman', serif;
      font-size: 30px;
      color: #f5f0e8;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .subtitle {
      font-size: 12px;
      color: #444;
      font-weight: 300;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }
    .clear-btn {
      background: transparent;
      border: 1px solid #1f1f1f;
      color: #444;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
      visibility: hidden;
    }
    .clear-btn.visible { visibility: visible; }
    .clear-btn:active { color: #888; background: #141414; }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 0 24px 12px;
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 10px 0;
      background: transparent;
      border: none;
      color: #333;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s;
      position: relative;
    }
    .tab.active { color: #f5f0e8; }
    .tab::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 1px;
      background: #f5f0e8;
      transition: width 0.25s ease;
    }
    .tab.active::after { width: 24px; }

    /* ── PHOTO PICK SCREEN ── */
    #pick-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 24px 32px;
      gap: 20px;
      overflow-y: auto;
    }

    .pick-cards { width: 100%; display: flex; gap: 12px; flex: 1; }

    .pick-card {
      flex: 1;
      border-radius: 16px;
      border: 1.5px dashed #282828;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
      -webkit-user-select: none;
    }
    .pick-card:active { background: #161616; border-color: #333; }
    .pick-card.filled { border-style: solid; border-color: #222; }
    .pick-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .card-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.38);
      display: flex; align-items: center; justify-content: center;
    }
    .card-icon {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #1c1c1c;
      border: 1px solid #2d2d2d;
      display: flex; align-items: center; justify-content: center;
      color: #555;
      font-size: 20px;
      line-height: 1;
    }
    .card-label {
      font-size: 11px;
      color: #333;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .note {
      font-size: 12px;
      color: #2e2e2e;
      text-align: center;
      letter-spacing: 0.3px;
    }

    .primary-btn {
      width: 100%;
      padding: 16px 0;
      border-radius: 14px;
      background: #f5f0e8;
      color: #0a0a0a;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .primary-btn:disabled { background: #1a1a1a; color: #2e2e2e; cursor: not-allowed; }
    .primary-btn:not(:disabled):active { transform: scale(0.98); background: #e8e3dc; }

    input[type="file"] { display: none; }

    /* ── COMPARE SCREEN ── */
    #compare-screen {
      flex: 1;
      display: none;
      flex-direction: column;
    }
    .image-stage {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #111;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .slide img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
    }
    .slide.hidden-left  { opacity: 0; transform: translateX(-16px); pointer-events: none; }
    .slide.hidden-right { opacity: 0; transform: translateX(16px);  pointer-events: none; }
    .slide.visible      { opacity: 1; transform: translateX(0); }

    .tap-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.65);
      font-size: 12px;
      letter-spacing: 0.4px;
      padding: 7px 16px;
      border-radius: 100px;
      pointer-events: none;
      white-space: nowrap;
      animation: fadeHint 3s forwards;
    }
    @keyframes fadeHint {
      0%   { opacity: 0; }
      15%  { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .bottom-bar {
      flex-shrink: 0;
      padding: 16px 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .dots { display: flex; gap: 10px; }
    .dot { flex: 1; height: 2px; border-radius: 2px; background: #222; transition: background 0.25s; }
    .dot.on { background: #f5f0e8; }
    .labels { display: flex; justify-content: space-between; }
    .photo-lbl { font-size: 12px; color: #333; transition: color 0.25s; }
    .photo-lbl.on { color: #777; }
    .action-row { display: flex; gap: 10px; }
    .action-btn {
      flex: 1;
      padding: 12px 0;
      border-radius: 10px;
      border: 1px solid #1e1e1e;
      background: #111;
      color: #555;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.1px;
    }
    .action-btn:active { background: #181818; color: #888; transform: scale(0.98); }

    /* ── QR SCREEN ── */
    #qr-screen {
      flex: 1;
      display: none;
      flex-direction: column;
      padding: 8px 24px 32px;
      gap: 18px;
      overflow-y: auto;
    }

    .qr-input-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .qr-input-label {
      font-size: 11px;
      color: #555;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      padding-left: 2px;
    }
    .qr-input {
      width: 100%;
      min-height: 96px;
      max-height: 200px;
      resize: vertical;
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 14px;
      padding: 14px 16px;
      color: #f5f0e8;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.4;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
    }
    .qr-input:focus { border-color: #333; background: #131313; }
    .qr-input::placeholder { color: #333; }

    .qr-output {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 0;
    }
    .qr-output.visible { display: flex; }

    .qr-card {
      background: #f5f0e8;
      border-radius: 20px;
      padding: 26px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04);
    }
    .qr-card img {
      width: 100%;
      max-width: 280px;
      aspect-ratio: 1;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      display: block;
    }
    .qr-card-caption {
      font-size: 10px;
      color: #888;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      text-align: center;
    }

    .save-hint {
      font-size: 11px;
      color: #444;
      text-align: center;
      letter-spacing: 0.3px;
      max-width: 280px;
      line-height: 1.5;
    }
    .save-hint strong { color: #888; font-weight: 500; }

    .error-msg {
      color: #c97777;
      font-size: 12px;
      text-align: center;
      padding: 8px;
    }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.18s ease;
    }
    .modal-backdrop.open { display: flex; opacity: 1; }
    .modal {
      background: #161616;
      border: 1px solid #242424;
      border-radius: 18px;
      padding: 24px 22px 18px;
      max-width: 320px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      transform: scale(0.96);
      transition: transform 0.18s ease;
    }
    .modal-backdrop.open .modal { transform: scale(1); }
    .modal-title {
      font-family: 'DM Serif Display', serif;
      font-size: 19px;
      color: #f5f0e8;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    .modal-text {
      font-size: 13px;
      color: #777;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
    }
    .modal-btn {
      flex: 1;
      padding: 11px 0;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .modal-btn.cancel {
      background: transparent;
      border-color: #2a2a2a;
      color: #888;
    }
    .modal-btn.cancel:active { background: #1c1c1c; color: #aaa; }
    .modal-btn.danger {
      background: #c97777;
      color: #0a0a0a;
    }
    .modal-btn.danger:active { background: #b66666; transform: scale(0.98); }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-titles">
      <div class="title">Diptych</div>
      <div class="subtitle" id="header-subtitle">Photo Compare</div>
    </div>
    <button class="clear-btn" id="clear-btn" onclick="clearAll()">Clear</button>
  </div>

  <!-- TABS -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="photo" onclick="switchTab('photo')">Photos</button>
    <button class="tab" data-tab="qr" onclick="switchTab('qr')">QR Code</button>
  </div>

  <!-- PHOTO PICK SCREEN -->
  <div id="pick-screen">
    <div class="pick-cards">
      <div class="pick-card" id="card-0" onclick="triggerPick(0)">
        <div class="card-icon">+</div>
        <div class="card-label">Photo 1</div>
      </div>
      <div class="pick-card" id="card-1" onclick="triggerPick(1)">
        <div class="card-icon">+</div>
        <div class="card-label">Photo 2</div>
      </div>
    </div>
    <div class="note" id="note">Select two photos to begin</div>
    <button class="primary-btn" id="start-btn" disabled onclick="openCompare()">Compare Photos</button>

    <input type="file" id="file-0" accept="image/*" onchange="handleFile(0, this)" />
    <input type="file" id="file-1" accept="image/*" onchange="handleFile(1, this)" />
  </div>

  <!-- COMPARE SCREEN -->
  <div id="compare-screen">
    <div class="image-stage" id="stage">
      <div class="slide hidden-right" id="slide-0"><img id="img-0" /></div>
      <div class="slide hidden-right" id="slide-1"><img id="img-1" /></div>
    </div>
    <div class="bottom-bar">
      <div class="dots">
        <div class="dot on" id="dot-0"></div>
        <div class="dot"    id="dot-1"></div>
      </div>
      <div class="labels">
        <span class="photo-lbl on" id="lbl-0">Photo 1</span>
        <span class="photo-lbl"    id="lbl-1">Photo 2</span>
      </div>
      <div class="action-row">
        <button class="action-btn" onclick="backToPick()">← Back</button>
        <button class="action-btn" onclick="replaceCurrent()">↺ Replace current</button>
      </div>
    </div>
    <input type="file" id="file-replace" accept="image/*" onchange="handleReplace(this)" />
  </div>

  <!-- QR SCREEN -->
  <div id="qr-screen">
    <div class="qr-input-wrap">
      <div class="qr-input-label">Text or URL</div>
      <textarea
        id="qr-input"
        class="qr-input"
        placeholder="Type a URL, message, WiFi info, contact details, anything…"
        oninput="onQRInput()"
      ></textarea>
    </div>

    <button class="primary-btn" id="qr-gen-btn" disabled onclick="generateQR()">
      Generate QR Code
    </button>

    <div class="error-msg" id="qr-error" style="display:none;"></div>

    <div class="qr-output" id="qr-output">
      <div class="qr-card">
        <img id="qr-image" alt="QR code" />
        <div class="qr-card-caption" id="qr-caption">Scan to view</div>
      </div>
      <div class="save-hint">
        <strong>Long-press</strong> the QR code, then tap <strong>Save to Photos</strong>.
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <div class="modal-title" id="modal-title">Clear photos?</div>
      <div class="modal-text" id="modal-text">This will remove both saved photos from the app.</div>
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-btn danger" id="modal-confirm-btn" onclick="confirmModal()">Clear</button>
      </div>
    </div>
  </div>
</div>

<script>
  /* ─────────── INDEXEDDB ─────────── */
  const DB_NAME = 'diptych-db';
  const STORE = 'photos';
  let dbPromise;

  function openDB() {
    if (dbPromise) return dbPromise;
    dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror   = () => reject(req.error);
    });
    return dbPromise;
  }
  async function dbPut(key, blob) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(blob, key);
      tx.oncomplete = () => res();
      tx.onerror    = () => rej(tx.error);
    });
  }
  async function dbGet(key) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, 'readonly');
      const r = tx.objectStore(STORE).get(key);
      r.onsuccess = () => res(r.result || null);
      r.onerror   = () => rej(r.error);
    });
  }
  async function dbDel(key) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete(key);
      tx.oncomplete = () => res();
      tx.onerror    = () => rej(tx.error);
    });
  }

  /* ─────────── STATE ─────────── */
  const photoUrls = [null, null];
  let current = 0;
  let busy = false;
  let currentTab = 'photo';
  let currentPhotoView = 'pick'; // 'pick' or 'compare'

  /* ─────────── TABS ─────────── */
  function switchTab(name) {
    currentTab = name;
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === name);
    });
    document.getElementById('clear-btn').style.display = (name === 'photo') ? '' : 'none';

    if (name === 'photo') {
      document.getElementById('header-subtitle').textContent = 'Photo Compare';
      document.getElementById('qr-screen').style.display = 'none';
      if (currentPhotoView === 'compare' && photoUrls[0] && photoUrls[1]) {
        openCompare();
      } else {
        showPhotoView('pick');
      }
    } else {
      document.getElementById('header-subtitle').textContent = 'QR Generator';
      document.getElementById('pick-screen').style.display = 'none';
      document.getElementById('compare-screen').style.display = 'none';
      document.getElementById('qr-screen').style.display = 'flex';
    }
    localStorage.setItem('diptych-tab', name);
  }

  /* ─────────── PHOTO PICK ─────────── */
  function triggerPick(idx) { document.getElementById('file-' + idx).click(); }

  async function handleFile(idx, input) {
    const file = input.files[0];
    if (!file) return;
    input.value = '';
    try { await dbPut('photo-' + idx, file); }
    catch (e) { alert('Could not save photo: ' + e.message); return; }
    if (photoUrls[idx]) URL.revokeObjectURL(photoUrls[idx]);
    photoUrls[idx] = URL.createObjectURL(file);
    renderCard(idx);
    updateNote();
    updateClearBtn();
  }

  function renderCard(idx) {
    const card = document.getElementById('card-' + idx);
    card.innerHTML = '';
    if (photoUrls[idx]) {
      card.classList.add('filled');
      const img = document.createElement('img');
      img.src = photoUrls[idx];
      const ov = document.createElement('div');
      ov.className = 'card-overlay';
      const ic = document.createElement('div');
      ic.className = 'card-icon';
      ic.textContent = '↺';
      ov.appendChild(ic);
      card.appendChild(img);
      card.appendChild(ov);
    } else {
      card.classList.remove('filled');
      const ic = document.createElement('div');
      ic.className = 'card-icon';
      ic.textContent = '+';
      const lbl = document.createElement('div');
      lbl.className = 'card-label';
      lbl.textContent = 'Photo ' + (idx + 1);
      card.appendChild(ic);
      card.appendChild(lbl);
    }
  }

  function updateNote() {
    const note = document.getElementById('note');
    const btn  = document.getElementById('start-btn');
    const both = photoUrls[0] && photoUrls[1];
    const none = !photoUrls[0] && !photoUrls[1];
    note.textContent = both ? 'Both photos saved — ready to compare'
                     : none ? 'Select two photos to begin'
                            : 'Select one more photo to begin';
    btn.disabled = !both;
  }

  function updateClearBtn() {
    const any = photoUrls[0] || photoUrls[1];
    document.getElementById('clear-btn').classList.toggle('visible', !!any);
  }

  async function clearAll() {
    showModal({
      title: 'Clear photos?',
      text: 'This will remove both saved photos from the app.',
      confirmLabel: 'Clear',
      onConfirm: async () => {
        try {
          await dbDel('photo-0');
          await dbDel('photo-1');
        } catch (e) {
          console.warn('IDB delete failed:', e);
        }
        localStorage.removeItem('diptych-view');
        [0,1].forEach(i => {
          if (photoUrls[i]) URL.revokeObjectURL(photoUrls[i]);
          photoUrls[i] = null;
          renderCard(i);
        });
        updateNote();
        updateClearBtn();
        showPhotoView('pick');
      }
    });
  }

  /* ─────────── MODAL ─────────── */
  let modalConfirmHandler = null;

  function showModal({ title, text, confirmLabel, onConfirm }) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-text').textContent = text;
    document.getElementById('modal-confirm-btn').textContent = confirmLabel || 'Confirm';
    modalConfirmHandler = onConfirm;
    document.getElementById('modal-backdrop').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    modalConfirmHandler = null;
  }

  async function confirmModal() {
    const handler = modalConfirmHandler;
    closeModal();
    if (handler) await handler();
  }

  // Tap backdrop (outside modal) to close
  document.addEventListener('DOMContentLoaded', () => {
    const backdrop = document.getElementById('modal-backdrop');
    if (backdrop) {
      backdrop.addEventListener('click', (e) => {
        if (e.target === backdrop) closeModal();
      });
    }
  });

  /* ─────────── COMPARE ─────────── */
  function openCompare() {
    current = 0;
    document.getElementById('img-0').src = photoUrls[0];
    document.getElementById('img-1').src = photoUrls[1];
    showPhotoView('compare');
    const s0 = document.getElementById('slide-0');
    const s1 = document.getElementById('slide-1');
    s0.className = 'slide hidden-right';
    s1.className = 'slide hidden-right';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      s0.className = 'slide visible';
    }));
    updateIndicators();
    addHint();
  }

  function addHint() {
    const stage = document.getElementById('stage');
    const old = stage.querySelector('.tap-hint');
    if (old) old.remove();
    const h = document.createElement('div');
    h.className = 'tap-hint';
    h.textContent = 'Tap or swipe to switch';
    stage.appendChild(h);
    setTimeout(() => h.remove(), 3200);
  }

  function swap() {
    if (busy) return;
    busy = true;
    const next = 1 - current;
    const cur  = document.getElementById('slide-' + current);
    const nxt  = document.getElementById('slide-' + next);
    nxt.className = 'slide hidden-right';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      cur.className = 'slide hidden-left';
      nxt.className = 'slide visible';
      current = next;
      updateIndicators();
      setTimeout(() => { busy = false; }, 280);
    }));
  }

  function updateIndicators() {
    [0, 1].forEach(i => {
      document.getElementById('dot-' + i).className = 'dot' + (i === current ? ' on' : '');
      document.getElementById('lbl-' + i).className = 'photo-lbl' + (i === current ? ' on' : '');
    });
  }

  function backToPick() { showPhotoView('pick'); }

  /* ─────────── TAP + SWIPE GESTURES ─────────── */
  let touchStartX = null;
  let touchStartY = null;
  let suppressClick = false;

  function onStageTouchStart(e) {
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }

  function onStageTouchEnd(e) {
    if (touchStartX === null) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    touchStartX = null;
    touchStartY = null;

    const absX = Math.abs(dx);
    const absY = Math.abs(dy);

    // Horizontal swipe: at least 40px, and more horizontal than vertical
    if (absX > 40 && absX > absY * 1.2) {
      suppressClick = true;
      // Reset after a moment so future taps still work
      setTimeout(() => { suppressClick = false; }, 400);
      swap();
    }
  }

  function onStageClick() {
    if (suppressClick) {
      suppressClick = false;
      return;
    }
    swap();
  }

  function attachStageHandlers() {
    const stage = document.getElementById('stage');
    if (!stage || stage.dataset.bound === '1') return;
    stage.addEventListener('touchstart', onStageTouchStart, { passive: true });
    stage.addEventListener('touchend',   onStageTouchEnd,   { passive: true });
    stage.addEventListener('click',      onStageClick);
    stage.dataset.bound = '1';
  }

  function replaceCurrent() { document.getElementById('file-replace').click(); }

  async function handleReplace(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = '';
    try { await dbPut('photo-' + current, file); }
    catch (e) { alert('Could not save photo: ' + e.message); return; }
    if (photoUrls[current]) URL.revokeObjectURL(photoUrls[current]);
    photoUrls[current] = URL.createObjectURL(file);
    document.getElementById('img-' + current).src = photoUrls[current];
    renderCard(current);
  }

  function showPhotoView(view) {
    currentPhotoView = view;
    document.getElementById('pick-screen').style.display    = view === 'pick'    ? 'flex' : 'none';
    document.getElementById('compare-screen').style.display = view === 'compare' ? 'flex' : 'none';
    localStorage.setItem('diptych-view', view);
    if (view === 'pick') {
      document.getElementById('slide-0').className = 'slide hidden-right';
      document.getElementById('slide-1').className = 'slide hidden-right';
    }
  }

  /* ─────────── QR GENERATOR ─────────── */
  function onQRInput() {
    const text = document.getElementById('qr-input').value;
    document.getElementById('qr-gen-btn').disabled = !text.trim();
    localStorage.setItem('diptych-qr-text', text);
    // Hide previous output when input changes
    document.getElementById('qr-output').classList.remove('visible');
    document.getElementById('qr-error').style.display = 'none';
  }

  function generateQR() {
    const text = document.getElementById('qr-input').value.trim();
    const errEl = document.getElementById('qr-error');
    errEl.style.display = 'none';

    if (!text) return;
    if (typeof qrcode === 'undefined') {
      errEl.textContent = 'QR library failed to load. Reconnect once to fetch it, then it will work offline.';
      errEl.style.display = 'block';
      return;
    }

    try {
      // typeNumber 0 = auto-size; 'M' = ~15% error correction
      const qr = qrcode(0, 'M');
      qr.addData(text);
      qr.make();
      const dataUrl = qr.createDataURL(8, 2); // cellSize=8, margin=2 cells
      const img = document.getElementById('qr-image');
      img.src = dataUrl;
      document.getElementById('qr-output').classList.add('visible');
      // caption: show first ~40 chars
      const caption = text.length > 40 ? text.slice(0, 40) + '…' : text;
      document.getElementById('qr-caption').textContent = caption;
    } catch (e) {
      errEl.textContent = 'Could not generate QR — text may be too long. Try shorter content.';
      errEl.style.display = 'block';
    }
  }

  /* ─────────── BOOT ─────────── */
  function withTimeout(promise, ms, fallback) {
    return Promise.race([
      promise,
      new Promise(resolve => setTimeout(() => resolve(fallback), ms))
    ]);
  }

  async function init() {
    // Render basic UI first so the user sees something even if IDB hangs
    renderCard(0);
    renderCard(1);
    updateNote();
    attachStageHandlers();

    // Restore QR text (localStorage is sync, fast)
    try {
      const savedText = localStorage.getItem('diptych-qr-text');
      if (savedText) {
        document.getElementById('qr-input').value = savedText;
        document.getElementById('qr-gen-btn').disabled = !savedText.trim();
      }
    } catch (e) { /* ignore */ }

    // Restore tab immediately (so we're on the right screen before IDB resolves)
    let lastTab = 'photo';
    try { lastTab = localStorage.getItem('diptych-tab') || 'photo'; } catch (e) {}
    switchTab(lastTab);

    // Now load photos from IDB with a 3-second safety timeout
    try {
      const [b0, b1] = await withTimeout(
        Promise.all([dbGet('photo-0'), dbGet('photo-1')]),
        3000,
        [null, null]
      );
      if (b0) photoUrls[0] = URL.createObjectURL(b0);
      if (b1) photoUrls[1] = URL.createObjectURL(b1);
    } catch (e) {
      console.warn('IDB load failed:', e);
    }

    // Re-render cards with loaded photos
    renderCard(0);
    renderCard(1);
    updateNote();
    updateClearBtn();

    // If both photos exist, default to compare view
    currentPhotoView = (photoUrls[0] && photoUrls[1]) ? 'compare' : 'pick';
    if (currentTab === 'photo' && currentPhotoView === 'compare') {
      openCompare();
    }
  }

  // Run init when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
</body>
</html>
